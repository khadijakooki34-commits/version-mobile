
name: safar_morocco
description: A new Flutter project for Safar Morocco.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # For API calls
  http: ^1.1.0

  # State management
  provider: ^6.0.5

  # Local storage for JWT
  shared_preferences: ^2.2.0

  # Google Sign-In
  google_sign_in: ^6.1.5
  
  # For modern UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
