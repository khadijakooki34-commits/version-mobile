name: safar_morocco
description: Intelligent interactive tourism discovery platform for Morocco.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0

  # Local Storage
  shared_preferences: ^2.2.0

  # Google Sign-In (OAuth2)
  google_sign_in: ^6.2.2

  # Authentication
  jwt_decoder: ^2.0.1

  # UI & Icons
  cupertino_icons: ^1.0.2
  intl: ^0.20.2

  # Image handling
  cached_network_image: ^3.3.0
  image_picker: ^1.0.0

  # QR Code
  qr_flutter: ^4.1.0
  permission_handler: ^11.4.0

  # Loading & Dialogs
  loading_animation_widget: ^1.2.0
  fluttertoast: ^8.2.0

  # Charts (for statistics)
  fl_chart: ^0.63.0

  # Typography
  google_fonts: ^6.2.1

  # Connectivity
  connectivity_plus: ^5.0.0

  # Google Maps
  google_maps_flutter: ^2.5.0
  url_launcher: ^6.2.0
  
  # OpenStreetMap Alternative (100% Gratuit)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/logos/

  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Roboto-Light.ttf
  #         weight: 300

  generate: true
